  ## Ticket State Machine
  
  ```
  Bug / Enhancement:
    CREATED в”Ђв”Ђв†’ VERIFIED в”Ђв”Ђв†’ IN_PROGRESS в”Ђв”Ђв†’ VERIFY_FIX в”Ђв”Ђв†’ CLOSED
       в”‚            в”‚              в”‚               в”‚
       в””в†’ REJECTED  в””в†’ REJECTED   в””в†’ VERIFIED     в””в†’ IN_PROGRESS
                                  (sent back)      (fix failed)
  ```
  
  **Transition rules вЂ” all enforced in `tickets/state-machine/`:**
  
  | Transition | Required comment type |
  |:-----------|:---------------------|
  | CREATED в†’ VERIFIED | `VERIFICATION` |
  | IN_PROGRESS в†’ VERIFY_FIX | `FIX_REPORT` |
  | VERIFY_FIX в†’ CLOSED | `REVIEW` |
  | VERIFY_FIX в†’ IN_PROGRESS | `REVIEW` |
  | Any в†’ REJECTED | `GENERAL` |
  
  ## Auth Model
  
  | Actor | Method | Guard |
  |:------|:-------|:------|
  | Human (web) | Email + password в†’ JWT | `JwtAuthGuard` |
  | Agent (CLI/API) | API key в†’ Bearer token | `ApiKeyGuard` |
  | Protected routes | Either JWT or API key | `CombinedAuthGuard` |
  
  - API keys: `crypto.randomBytes(32).toString('hex')` вЂ” shown once, stored as bcrypt hash
  - JWT via `@nathapp/nestjs-auth` v3 guards + strategies
  
  ## Prisma & Database
  
  - Schema at: `prisma/schema.prisma` (monorepo root level)
  - `DATABASE_PROVIDER` env: `"sqlite"` | `"postgresql"` | `"mysql"`
  - `DATABASE_URL` env: connection string for chosen provider
  - `PrismaService` lives in `apps/api/src/prisma/` вЂ” registered as global module
  - Ticket `number` is auto-incremented per project (not global) вЂ” use a transaction to safely get `MAX(number)+1`
  
