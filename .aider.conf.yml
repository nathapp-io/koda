  ## OpenAPI Spec & Client Generation
  
  The CLI and web app get their typed API clients from a generated OpenAPI spec.
  
  ```
  apps/api (NestJS + @nestjs/swagger)
    в†’ bun run api:export-spec
    в†’ openapi.json (monorepo root вЂ” source of truth)
    в†’ bun run generate:cli  в†’ apps/cli/src/generated/   (@hey-api/client-axios)
    в†’ bun run generate:web  в†’ apps/web/generated/            (@hey-api/client-fetch)
  ```
  
  **Rules:**
  - Run `bun run generate` after ANY API endpoint change before touching CLI or web code
  - Never manually edit files inside `*/generated/` вЂ” they are overwritten on next generate
  - `openapi.json` is committed to the repo so CI can regenerate clients without booting the API
  - Export script: `apps/api/scripts/export-spec.ts` вЂ” boots NestJS, dumps spec, exits
  
