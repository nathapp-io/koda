name: CI
# turbo remote cache enabled via TURBO_TEAM + TURBO_TOKEN repo secrets (verified)

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "bun.lock"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"
      - "openapi.json"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "bun.lock"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"
      - "openapi.json"
env:
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # ─── Typecheck + Lint (parallel) ────────────────────────────────────────────
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        check: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate        

      - name: Generate OPENAPI types
        run: bun run generate:cli        

      - name: ${{ matrix.check }}
        run: bun run ${{ matrix.check }}

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Generate OPENAPI types
        run: bun run generate:cli

      - name: Test
        run: bunx turbo run test -- --bail

  # ─── Retrieval Evaluation ───────────────────────────────────────────────────
  evaluate:
    name: evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [checks, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Generate OPENAPI types
        run: bun run generate:cli

      - name: Build API
        run: bunx turbo run build --filter=@nathapp/koda-api

      - name: Migrate database
        run: cd apps/api && bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ vars.EVAL_DATABASE_URL || format('file:{0}/koda-eval.db', runner.temp) }}

      - name: Evaluate retrieval
        run: cd apps/api && bun run evaluate:retrieval
        env:
          DATABASE_URL: ${{ vars.EVAL_DATABASE_URL || format('file:{0}/koda-eval.db', runner.temp) }}
          RAG_EVAL_PROJECT_ID: proj_eval_001
          # Dummy secrets — required by env validation but not used in eval (no auth/JWTs issued)
          JWT_SECRET: eval-jwt-secret-not-used-in-eval
          JWT_REFRESH_SECRET: eval-jwt-refresh-secret-not-used-in-eval
          API_KEY_SECRET: eval-api-key-secret-not-used-in-eval
          RAG_IN_MEMORY_ONLY: "true"

  # ─── Smoke Test (API + CLI) ────────────────────────────────────────────────
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Generate OPENAPI types
        run: bun run generate:cli

      - name: Smoke test
        run: bash scripts/smoke-test-cli.sh
