name: CI
# turbo remote cache enabled via TURBO_TEAM + TURBO_TOKEN repo secrets (verified)

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "bun.lock"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "bun.lock"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"

env:
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # ─── Typecheck + Lint (parallel) ────────────────────────────────────────────
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        check: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Prisma client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: apps/api/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: bun run db:generate

      - name: ${{ matrix.check }}
        run: bun run ${{ matrix.check }}

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Prisma client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: apps/api/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: bun run db:generate

      - name: Test
        run: bunx turbo run test -- --bail

  # ─── Smoke Test (API + CLI) ────────────────────────────────────────────────
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Prisma client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: apps/api/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: bun run db:generate

      - name: Smoke test
        run: bash scripts/smoke-test-cli.sh
