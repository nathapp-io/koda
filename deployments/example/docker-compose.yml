name: koda-local

services:
  migrate:
    image: nathapp/koda-api:${KODA_VERSION:-latest}
    environment:
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-file:/data/koda.db}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-me-api-key}
      API_PORT: 3100
      API_PREFIX: api
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LANCEDB_PATH: /data/lancedb
    command: ["sh", "-lc", "bunx prisma migrate deploy"]
    volumes:
      - koda_data:/data
    restart: "no"

  api:
    image: nathapp/koda-api:${KODA_VERSION:-latest}
    ports:
      - "${API_PORT:-3100}:3100"
    environment:
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-file:/data/koda.db}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-me-api-key}
      API_PORT: 3100
      API_PREFIX: api
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LANCEDB_PATH: /data/lancedb
    volumes:
      - koda_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    image: nathapp/koda-web:${KODA_VERSION:-latest}
    ports:
      - "${WEB_PORT:-3101}:3101"
    environment:
      NUXT_API_INTERNAL_URL: http://api:3100
      PORT: 3101
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  koda_data:
    driver: local
