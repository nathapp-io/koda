services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        BUN_VERSION: 1.3.11
        TURBO_VERSION: 2.8.17
        BUILD_APP: api
        BUILD_APP_PACKAGE: "@nathapp/koda-api"
    ports:
      - "${API_PORT:-3100}:3100"
    environment:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:/data/koda.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      API_KEY_SECRET: ${API_KEY_SECRET}
      API_PORT: 3100
      API_PREFIX: api
      # When --profile rag is active, point at the bundled Ollama container;
      # otherwise falls back to host.docker.internal for BYO Ollama installs.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LANCEDB_PATH: /data/lancedb
    volumes:
      - koda_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BUN_VERSION: 1.3.11
        TURBO_VERSION: 2.8.17
        BUILD_APP: web
        BUILD_APP_PACKAGE: "@nathapp/koda-web"
    ports:
      - "${WEB_PORT:-3101}:3101"
    environment:
      # Internal URL: Nuxt server → API container via Docker service name
      NUXT_API_INTERNAL_URL: http://api:3100
      PORT: 3101
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["rag"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  koda_data:
    driver: local
  ollama_data:
    driver: local
